        { text: "同年，云韶最后一次登台说“我不是长平公主”“我不是谁”，此后不再登台。", person: "yunshao", indent: 1, fullDesc: "台下的人笑了，以为她在开玩笑。她也笑了，眼泪掉在琵琶上。她把琵琶放在台上，走进巷子，没有回头。" }

        { text: "调子在风里、雨里、货郎嗓子里。问话还在，没有人回答。", person: "multi", indent: 0, fullDesc: "“你还在吗？”问话飘荡，转了一百年。没有人知道那是谁在问，也没有人能回答。" }

    const root = document.getElementById('timelineRoot');
    let activeDetailPanel = null;

    function clearDetail() {
      if (activeDetailPanel) { activeDetailPanel.remove(); activeDetailPanel = null; }
    }

    function showDetail(eventItem, year, desc) {
      clearDetail();
      const detailDiv = document.createElement('div');
      detailDiv.className = 'detail-panel';
      detailDiv.innerHTML = `<div class="detail-year">${year}</div>${desc}`;
      eventItem.parentNode.insertBefore(detailDiv, eventItem.nextSibling);
      activeDetailPanel = detailDiv;
      setTimeout(() => detailDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }

    function buildTimeline() {
      root.innerHTML = '';
      timelineData.forEach(item => {
        const yearDiv = document.createElement('div');
        yearDiv.className = 'timeline-year';
        const marker = document.createElement('div');
        marker.className = 'year-marker';
        marker.innerHTML = `<span>${item.year}</span>`;
        yearDiv.appendChild(marker);
        const eventsBlock = document.createElement('div');
        eventsBlock.className = 'events-block';
        item.events.forEach(ev => {
          const evDiv = document.createElement('div');
          evDiv.className = `event-item ${ev.person || 'multi'} indent-${ev.indent || 0}`;
          let content = ev.text;
          if (ev.relation) content += `<span class="relation-tag">${ev.relation}</span>`;
          evDiv.innerHTML = content;
          evDiv.dataset.year = item.year;
          evDiv.dataset.desc = ev.fullDesc || ev.text;
          evDiv.addEventListener('click', (e) => {
            e.stopPropagation();
            const currentItem = e.currentTarget;
            if (activeDetailPanel && activeDetailPanel.previousElementSibling === currentItem) {
              clearDetail(); return;
            }
            showDetail(currentItem, currentItem.dataset.year, currentItem.dataset.desc);
          });
          eventsBlock.appendChild(evDiv);
        });
        yearDiv.appendChild(eventsBlock);
        root.appendChild(yearDiv);
      });
    }

    buildTimeline();

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.event-item')) clearDetail();
    });

    // ---------- 微信/QQ分享引导 ----------
    const guideEl = document.getElementById('shareGuide');
    const closeBtn = document.getElementById('closeShareBtn');
    
    function isWechatOrQQ() {
      const ua = navigator.userAgent.toLowerCase();
      return /micromessenger/.test(ua) || /qq\//.test(ua) || /mqqbrowser/.test(ua);
    }

    if (isWechatOrQQ()) {
      guideEl.style.display = 'flex';
      // 如果之前未关闭过 (可选本地存储)
      if (localStorage.getItem('hideShareGuide') === 'true') {
        guideEl.style.display = 'none';
      }
    }

    closeBtn.addEventListener('click', () => {
      guideEl.style.display = 'none';
      localStorage.setItem('hideShareGuide', 'true');
    });

    // 若需要微信JSSDK配置分享（需后端签名），这里仅做提示。前端无法直接设置分享内容，但meta已优化卡片。
    // 可以尝试调用微信的旧API（已失效），但保留meta即可。
    console.log('「童子债」已装载分享接口。');
  })();
</script>
